<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0B1829;
      --surface: #0F2240;
      --surf2:   #162B50;
      --border:  #1E3A6A;
      --accent:  #4C8EF7;
      --accenth: #2D5FAF;
      --text:    #F0F4FF;
      --muted:   #7A8FAD;
      --green:   #3ECFA0;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }
    .wrap { width: 100%; max-width: 380px; padding: 0 16px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px 28px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .status span {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--green);
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13.5px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button {
      width: 100%;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accenth); }
    .footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11.5px;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="status">
        <div class="dot"></div>
        <span>WAF Active</span>
      </div>
      <h1>Admin Login</h1>
      <p class="sub">page2.html</p>
      <form action="/process2.php" method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="try: admin  or  ' OR '1'='1' --"
               autocomplete="off"/>
        <button type="submit">Sign in</button>
      </form>
    </div>
    <div class="footer">
      Unprotected version &rarr; <a href="/page1.html">page1.html</a>
    </div>
  </div>
</body>
</html>

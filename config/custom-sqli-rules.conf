# /etc/modsecurity/custom-sqli-rules.conf
# Custom SQLi detection rules. IDs 1100-1104.
# Loaded via /etc/apache2/mods-available/security2.conf glob.
# Do not add an explicit Include for this file in modsecurity.conf.

SecRule ARGS "@rx (?i)(\bor\b\s+[\'\"]?[0-9a-zA-Z]+[\'\"]?\s*=\s*[\'\"]?[0-9a-zA-Z]+)" \
    "id:1100,phase:2,deny,status:403,\
    msg:'SQLi: OR-based bypass',\
    logdata:'Input: %{MATCHED_VAR}',\
    tag:'attack-sqli',severity:'CRITICAL'"

SecRule ARGS "@rx (?i)(--|#|\/\*.*?\*\/)" \
    "id:1101,phase:2,deny,status:403,\
    msg:'SQLi: comment injection',\
    logdata:'Input: %{MATCHED_VAR}',\
    tag:'attack-sqli',severity:'CRITICAL'"

SecRule ARGS "@rx (?i)\bunion\b.{0,20}\bselect\b" \
    "id:1102,phase:2,deny,status:403,\
    msg:'SQLi: UNION SELECT',\
    logdata:'Input: %{MATCHED_VAR}',\
    tag:'attack-sqli',severity:'CRITICAL'"

SecRule ARGS "@rx (?i);\s*(drop|insert|update|delete|create|alter|exec|execute)" \
    "id:1103,phase:2,deny,status:403,\
    msg:'SQLi: stacked query',\
    logdata:'Input: %{MATCHED_VAR}',\
    tag:'attack-sqli',severity:'CRITICAL'"

SecRule ARGS "@detectSQLi" \
    "id:1104,phase:2,deny,status:403,\
    msg:'SQLi: detected by libModSecurity heuristic',\
    logdata:'%{MATCHED_VAR_NAME}: %{MATCHED_VAR}',\
    tag:'attack-sqli',severity:'CRITICAL'"
